<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup yaratish — BirgaQil</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>

<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="/" class="navbar-brand"><span class="logo-icon">🚀</span><span>Birga<span
                        class="text-gradient">Qil</span></span></a>
            <div class="navbar-links" id="nav-links">
                <a href="/">Bosh sahifa</a>
                <a href="/developers" class="auth-only">Dasturchilar</a>
                <a href="/dashboard" class="auth-only">Dashboard</a>
                <a href="/chat" class="auth-only">Chat</a>
            </div>
            <div class="navbar-actions">
                <div id="auth-buttons" class="guest-only" style="display:none;gap:var(--space-sm)">
                    <a href="/login" class="btn btn-ghost">Kirish</a>
                    <a href="/register" class="btn btn-primary">Ro'yxatdan o'tish</a>
                </div>
                <div id="user-menu" class="auth-only" style="display:flex;align-items:center;gap:var(--space-md)">
                    <a href="/notifications" class="btn-icon notification-badge" id="notif-btn">🔔<span
                            class="badge-count hidden" id="notif-count">0</span></a>
                    <a href="/profile" class="avatar avatar-sm navbar-avatar" id="nav-avatar">U</a>
                    <button class="btn btn-ghost btn-sm" onclick="logout()">Chiqish</button>
                </div>
            </div>
            <div class="nav-toggle" id="nav-toggle"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="page-content">
        <div class="container" style="max-width:700px">
            <h1 style="font-size:var(--font-size-2xl);margin-bottom:var(--space-xl)">Yangi Startup Yaratish 🚀</h1>
            <div class="card animate-fade-in-up">
                <form onsubmit="handleCreate(event)">
                    <div class="form-group">
                        <label class="form-label">Startup nomi *</label>
                        <input type="text" class="form-input" id="title" placeholder="Masalan: EduTech Platform"
                            required minlength="3">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tavsif *</label>
                        <textarea class="form-input" id="description"
                            placeholder="Startup loyihangiz haqida batafsil yozing..." required minlength="10"
                            rows="5"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Texnologiyalar (vergul bilan)</label>
                        <input type="text" class="form-input" id="tech_stack"
                            placeholder="React, Node.js, PostgreSQL, Docker">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Kategoriya</label>
                        <select class="form-select" id="category">
                            <option value="other">Boshqa</option>
                            <option value="edtech">EdTech</option>
                            <option value="fintech">FinTech</option>
                            <option value="healthtech">HealthTech</option>
                            <option value="ecommerce">E-Commerce</option>
                            <option value="social">Ijtimoiy tarmoq</option>
                            <option value="saas">SaaS</option>
                            <option value="ai">AI / ML</option>
                            <option value="gaming">Gaming</option>
                        </select>
                    </div>
                    <div style="display:flex;gap:var(--space-md)">
                        <button type="submit" class="btn btn-primary btn-lg" id="create-btn">Yaratish</button>
                        <a href="/dashboard" class="btn btn-secondary btn-lg">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) { }

        async function handleCreate(e) {
            e.preventDefault();
            const btn = document.getElementById('create-btn');
            btn.disabled = true; btn.textContent = 'Yaratilmoqda...';

            const tech_stack = document.getElementById('tech_stack').value.split(',').map(s => s.trim()).filter(Boolean);
            const data = await API.createStartup({
                title: document.getElementById('title').value.trim(),
                description: document.getElementById('description').value.trim(),
                tech_stack,
                category: document.getElementById('category').value,
            });

            if (data.success) {
                Toast.success('Startup yaratildi!');
                setTimeout(() => window.location.href = `/startup-detail?id=${data.data.id}`, 800);
            } else {
                Toast.error(data.message);
                btn.disabled = false; btn.textContent = 'Yaratish';
            }
        }
    </script>
</body>

</html>
