<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilni tahrirlash — BirgaQil</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand"><span class="logo-icon">🚀</span><span>Birga<span
                        class="text-gradient">Qil</span></span></a>
            <div class="navbar-links"><a href="/">Bosh sahifa</a><a href="/developers">Dasturchilar</a><a
                    href="/dashboard">Dashboard</a><a href="/chat">Chat</a></div>
            <div class="navbar-actions"><a href="/profile" class="avatar avatar-sm navbar-avatar">U</a><button
                    class="btn btn-ghost btn-sm" onclick="logout()">Chiqish</button></div>
        </div>
    </nav>

    <div class="page-content">
        <div class="container" style="max-width:600px">
            <h1 style="font-size:var(--font-size-2xl);margin-bottom:var(--space-xl)">Profilni tahrirlash</h1>
            <div class="card animate-fade-in-up">
                <form onsubmit="handleUpdate(event)">
                    <div class="form-group">
                        <label class="form-label">Foydalanuvchi nomi</label>
                        <input type="text" class="form-input" id="edit-username" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bio</label>
                        <textarea class="form-input" id="edit-bio" placeholder="O'zingiz haqingizda yozing..."
                            rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Texnik ko'nikmalar (vergul bilan ajrating)</label>
                        <input type="text" class="form-input" id="edit-skills"
                            placeholder="JavaScript, React, Node.js, Python">
                    </div>
                    <div style="display:flex;gap:var(--space-md)">
                        <button type="submit" class="btn btn-primary" id="save-btn">Saqlash</button>
                        <a href="/profile" class="btn btn-secondary">Bekor qilish</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        if (!requireAuth()) { }
        document.addEventListener('DOMContentLoaded', loadCurrentProfile);

        async function loadCurrentProfile() {
            const data = await API.getMe();
            if (data.success) {
                const u = data.data;
                document.getElementById('edit-username').value = u.username || '';
                document.getElementById('edit-bio').value = u.bio || '';
                document.getElementById('edit-skills').value = (u.skills || []).join(', ');
            }
        }

        async function handleUpdate(e) {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.textContent = 'Saqlanmoqda...';

            const skills = document.getElementById('edit-skills').value.split(',').map(s => s.trim()).filter(Boolean);
            const user = API.getUser();
            const data = await API.updateUser(user.id, {
                username: document.getElementById('edit-username').value.trim(),
                bio: document.getElementById('edit-bio').value.trim(),
                skills,
            });

            if (data.success) {
                API.setUser(data.data);
                Toast.success('Profil yangilandi!');
                setTimeout(() => window.location.href = '/profile', 800);
            } else {
                Toast.error(data.message);
                btn.disabled = false; btn.textContent = 'Saqlash';
            }
        }
    </script>
</body>

</html>
