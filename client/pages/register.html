<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BirgaQil platformasiga ro'yxatdan o'ting">
    <title>Ro'yxatdan o'tish — BirgaQil</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card animate-scale-in">
            <div class="card">
                <div class="auth-header">
                    <div class="logo-icon">🚀</div>
                    <h1>Ro'yxatdan o'tish</h1>
                    <p>BirgaQil platformasiga xush kelibsiz!</p>
                </div>
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Foydalanuvchi nomi</label>
                        <input type="text" class="form-input" id="username" placeholder="masalan: ali_dev" required
                            minlength="3">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Parol</label>
                        <input type="password" class="form-input" id="password" placeholder="Kamida 6 ta belgi" required
                            minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="register-btn">Ro'yxatdan
                        o'tish</button>
                </form>
                <div class="auth-footer">
                    Allaqachon akkauntingiz bormi? <a href="/login">Kirish</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.textContent = 'Yuklanmoqda...';

            const data = await API.register({
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
            });

            if (data.success) {
                API.setToken(data.data.accessToken);
                API.setRefreshToken(data.data.refreshToken);
                API.setUser(data.data.user);
                Toast.success(data.message);
                setTimeout(() => window.location.href = '/dashboard', 800);
            } else {
                Toast.error(data.message || 'Xatolik yuz berdi');
                btn.disabled = false;
                btn.textContent = "Ro'yxatdan o'tish";
            }
        }
    </script>
</body>

</html>
