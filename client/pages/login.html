<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BirgaQil platformasiga kirish">
    <title>Kirish — BirgaQil</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card animate-scale-in">
            <div class="card">
                <div class="auth-header">
                    <div class="logo-icon">🚀</div>
                    <h1>Tizimga kirish</h1>
                    <p>Akkauntingizga kiring</p>
                </div>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Parol</label>
                        <input type="password" class="form-input" id="password" placeholder="Parolingiz" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" style="width:100%"
                        id="login-btn">Kirish</button>
                </form>
                <div class="auth-footer">
                    Akkauntingiz yo'qmi? <a href="/register">Ro'yxatdan o'tish</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Yuklanmoqda...';

            const data = await API.login({
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
            });

            if (data.success) {
                API.setToken(data.data.accessToken);
                API.setRefreshToken(data.data.refreshToken);
                API.setUser(data.data.user);
                Toast.success(data.message);
                setTimeout(() => window.location.href = '/dashboard', 800);
            } else {
                Toast.error(data.message || 'Email yoki parol noto\'g\'ri');
                btn.disabled = false;
                btn.textContent = 'Kirish';
            }
        }
    </script>
</body>

</html>
